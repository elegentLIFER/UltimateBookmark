<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ultimate Bookmark</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: rgba(255, 255, 255, 0.82);
        --panel-strong: rgba(255, 255, 255, 0.94);
        --border: rgba(15, 23, 42, 0.08);
        --text: #0f172a;
        --muted: #64748b;
        --accent: #5b6cff;
        --accent-2: #0ea5e9;
        --shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
      }
      body[data-theme='dark'] {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: rgba(16, 23, 45, 0.72);
        --panel-strong: rgba(19, 28, 52, 0.92);
        --border: rgba(255, 255, 255, 0.09);
        --text: #eef2ff;
        --muted: #9aa6c4;
        --accent: #7c8cff;
        --accent-2: #4dd7ff;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-width: 2400px;
        min-height: 800px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background:
          radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 18%, transparent), transparent 28%),
          radial-gradient(circle at top right, color-mix(in srgb, var(--accent-2) 14%, transparent), transparent 24%),
          linear-gradient(135deg, color-mix(in srgb, var(--bg) 92%, #000 8%) 0%, var(--bg) 40%, color-mix(in srgb, var(--bg) 84%, #1f2937 16%) 100%);
        color: var(--text);
      }
      .app {
        display: grid;
        grid-template-columns: 360px 1fr;
        height: 100vh;
        padding: 24px;
        gap: 20px;
      }
      .sidebar, .content {
        border: 1px solid var(--border);
        background: var(--panel);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
        border-radius: 24px;
      }
      .sidebar {
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        position: sticky;
        top: 24px;
        height: calc(100vh - 48px);
      }
      .brand { display: flex; align-items: center; gap: 12px; }
      .brand-badge {
        width: 44px; height: 44px; border-radius: 14px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        box-shadow: 0 12px 30px rgba(124, 140, 255, 0.35);
      }
      .brand h1 { margin: 0; font-size: 18px; letter-spacing: 0.02em; }
      .brand p { margin: 3px 0 0; color: var(--muted); font-size: 13px; }
      .sidebar-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      .toolbar-inline {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--panel-strong);
      }
      .theme-switch {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }
      .theme-switch-label { color: var(--muted); font-size: 13px; }
      .switch {
        position: relative;
        width: 52px;
        height: 30px;
        display: inline-block;
      }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute;
        inset: 0;
        background: color-mix(in srgb, var(--muted) 28%, var(--panel-strong));
        border: 1px solid var(--border);
        border-radius: 999px;
        cursor: pointer;
        transition: 180ms ease;
      }
      .slider::before {
        content: '';
        position: absolute;
        width: 24px;
        height: 24px;
        left: 3px;
        top: 50%;
        transform: translateY(-50%);
        background: #fff;
        border-radius: 50%;
        box-shadow: 0 6px 14px rgba(0,0,0,0.18);
        transition: 180ms ease;
      }
      .switch input:checked + .slider { background: color-mix(in srgb, var(--accent) 65%, var(--panel-strong)); }
      .switch input:checked + .slider::before { transform: translate(22px, -50%); }
      .path-panel {
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 0;
      }
      .path-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .folder-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow-y: auto;
        padding-right: 6px;
        scrollbar-gutter: stable;
      }
      .folder-list::-webkit-scrollbar { width: 8px; }
      .folder-list::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--muted) 40%, transparent); border-radius: 999px; }
      .folder-item {
        padding: 12px 14px;
        gap: 10px;
        border-radius: 16px;
        color: var(--text);
        background: color-mix(in srgb, var(--panel-strong) 65%, transparent);
        border: 1px solid transparent;
        transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
        display: flex;
        align-items: center;
        cursor: pointer;
        user-select: none;
      }
      .folder-item:hover, .folder-item.active {
        transform: translateX(4px);
        background: color-mix(in srgb, var(--accent) 15%, var(--panel-strong));
        border-color: color-mix(in srgb, var(--accent) 26%, transparent);
      }
      .folder-item.active { box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 25%, transparent); }
      .folder-item .inline-action,
      .card .inline-action {
        margin-left: auto;
      }
      .toolbar-inline .search,
      .toolbar-inline .view-toggle {
        height: 42px;
        padding-top: 10px;
        padding-bottom: 10px;
      }
      .icon-action {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        line-height: 1;
      }
      .folder-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px; font-weight: 600; }
      body[data-layout='list'] .folder-name { font-size: 13px; }
      .folder-count { color: var(--muted); font-size: 12px; }
      .folder-icon { width: 18px; flex: 0 0 18px; display: inline-flex; align-items: center; justify-content: center; }
      .folder-toggle {
        border: none;
        background: rgba(255,255,255,0.06);
        color: var(--text);
        border-radius: 999px;
        height: 18px;
        width: 18px;
        cursor: pointer;
        font-size: 12px;
        line-height: 1;
        flex: 0 0 18px;
      }
      .folder-toggle-spacer { width: 18px; flex: 0 0 18px; }
      .content {
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        min-width: 0;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 16px;
      }
      .header h2 { margin: 0; font-size: 30px; }
      .header .subtitle { margin-top: 8px; color: var(--muted); }
      .view-toggle {
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        border-radius: 16px;
        padding: 14px 16px;
        cursor: pointer;
      }
      .search {
        width: min(360px, 100%);
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: var(--panel-strong);
        color: var(--text);
        outline: none;
      }
      .search::placeholder { color: color-mix(in srgb, var(--muted) 78%, transparent); }
      .button-like { width: auto; cursor: pointer; white-space: nowrap; padding-inline: 18px; }
      .inline-action {
        margin-top: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        border-radius: 999px;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 12px;
        width: fit-content;
      }
      .status {
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: var(--panel-strong);
        color: var(--muted);
        font-size: 14px;
      }
      .cards {
        display: grid;
        gap: 18px;
        overflow: auto;
        padding-right: 6px;
      }
      body[data-layout='grid'] .cards {
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      }
      body[data-layout='list'] .cards {
        grid-template-columns: 1fr;
      }
      .card {
        border-radius: 22px;
        padding: 20px;
        min-height: 160px;
        background: var(--panel-strong);
        position: relative;
        overflow: hidden;
        border: 1px solid var(--border);
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        cursor: pointer;
      }
      body[data-layout='list'] .card {
        min-height: 72px;
        padding: 12px 16px;
        display: grid;
        grid-template-columns: 36px minmax(0, 1fr);
        align-items: center;
        gap: 12px;
      }
      .card::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.08));
        pointer-events: none;
      }
      .card-logo-shell {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        background: color-mix(in srgb, var(--accent) 12%, var(--panel-strong));
        display: grid;
        place-items: center;
        margin-bottom: 14px;
        border: 1px solid var(--border);
        box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      }
      body[data-layout='list'] .card-logo-shell {
        margin-bottom: 0;
        width: 36px;
        height: 36px;
        border-radius: 12px;
      }
      .card-logo {
        width: 32px;
        height: 32px;
        object-fit: contain;
      }
      body[data-layout='list'] .card-logo { width: 22px; height: 22px; }
      .card > * {
        position: relative;
        z-index: 1;
        min-width: 0;
      }
      .card:hover {
        transform: translateY(-10px) scale(1.01);
        box-shadow: 0 24px 48px rgba(0,0,0,0.14);
        border-color: color-mix(in srgb, var(--accent) 35%, transparent);
      }
      .card .meta { color: var(--muted); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
      .card h3 {
        margin: 10px 0 8px;
        font-size: 18px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .card a {
        color: color-mix(in srgb, var(--accent) 74%, var(--text));
        text-decoration: none;
        word-break: break-word;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        display: block;
      }
      .card > div:nth-child(2) { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
      .card a:hover { color: var(--accent); }
      .card .desc {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      body[data-layout='list'] .card .desc { display: none; }
      body[data-layout='list'] .card .desc { margin-left: 0; }
      body[data-layout='list'] .card h3 { margin: 0 0 4px; font-size: 16px; }
      body[data-layout='list'] .card .meta { font-size: 11px; }
      .empty {
        grid-column: 1 / -1;
        padding: 60px 24px;
        text-align: center;
        color: var(--muted);
        border: 1px dashed var(--border);
        border-radius: 22px;
        background: var(--panel-strong);
      }
      .folder-children {
        display: grid;
        gap: 8px;
        margin: 0 0 0 0;
        overflow: hidden;
        max-height: 0;
        opacity: 0;
        transform: translateY(-4px);
        transition: max-height 240ms ease, opacity 240ms ease, transform 240ms ease;
      }
      .folder-children.expanded {
        max-height: 1200px;
        opacity: 1;
        transform: translateY(0);
      }
      .folder-node { display: grid; gap: 8px; }
      .folder-path-active { outline: 1px solid color-mix(in srgb, var(--accent) 22%, transparent); }
      @media (max-width: 900px) {
        .app { grid-template-columns: 1fr; }
        .sidebar { position: static; height: auto; }
        .header { flex-direction: column; align-items: stretch; }
        .toolbar { flex-wrap: wrap; }
      }
    </style>
  </head>
  <body data-layout="popup" data-theme="light">
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="brand">
            <div class="brand-badge"></div>
            <div>
              <h1>Ultimate Bookmark</h1>
              <p>Clean, fast, elegant</p>
            </div>
          </div>
          <div class="theme-switch">
            <span class="theme-switch-label">Light</span>
            <label class="switch" aria-label="Toggle dark mode">
              <input id="themeToggleBtn" type="checkbox" />
              <span class="slider"></span>
            </label>
          </div>
        </div>
        <div class="path-panel">
          <div class="path-title">
            <span>Current path</span>
            <span id="pathDepthLabel">0 levels</span>
          </div>
          <div class="folder-list" id="folderList"></div>
        </div>
      </aside>
      <main class="content">
        <div class="header">
          <div>
            <h2 id="currentFolderName">All Bookmarks</h2>
            <div class="subtitle" id="currentFolderSubtitle">Manage your bookmarks in style.</div>
          </div>
          <div class="toolbar-inline">
            <input class="search" id="searchInput" type="search" placeholder="Search bookmarks..." />
            <button id="viewModeToggleBtn" class="view-toggle">Grid</button>
            <button id="openFullPageBtn" class="search button-like">Open full page</button>
          </div>
        </div>
        <div class="status" id="statusBar">Connecting to the browser bookmarks API…</div>
        <section class="cards" id="bookmarkCards"></section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
